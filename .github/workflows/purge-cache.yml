name: Purge Cloudflare Cache (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要刷新的 Release tag（如 v0.9.30）"
        required: true
      include_latest:
        description: "是否同时刷新 releases/latest.json"
        required: true
        default: "true"
      additional_urls:
        description: "额外要刷新的 URL（可选，支持逗号/空格/换行分隔）"
        required: false

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${CLOUDFLARE_ZONE_ID}" ] || [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "❌ Missing required secrets: CLOUDFLARE_ZONE_ID or CLOUDFLARE_API_TOKEN"
            exit 1
          fi
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build purge URL list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          INCLUDE_LATEST="${{ github.event.inputs.include_latest }}"
          EXTRA_URLS="${{ github.event.inputs.additional_urls }}"
          BASE_URL="https://download.deepstudent.cn/releases/${TAG}"

          : > /tmp/purge-urls.txt

          echo "📦 Fetching release assets for tag: ${TAG}"
          ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" -q '.assets[].name')
          if [ -z "$ASSETS" ]; then
            echo "❌ No assets found for tag ${TAG}"
            exit 1
          fi

          while IFS= read -r NAME; do
            [ -z "$NAME" ] && continue
            echo "${BASE_URL}/${NAME}" >> /tmp/purge-urls.txt
          done <<< "$ASSETS"

          if [ "$INCLUDE_LATEST" = "true" ]; then
            echo "https://download.deepstudent.cn/releases/latest.json" >> /tmp/purge-urls.txt
          fi

          if [ -n "$EXTRA_URLS" ]; then
            echo "$EXTRA_URLS" | tr ',\n\r\t' '    ' | while IFS= read -r LINE; do
              for URL in $LINE; do
                echo "$URL" >> /tmp/purge-urls.txt
              done
            done
          fi

          sort -u /tmp/purge-urls.txt -o /tmp/purge-urls.txt
          COUNT=$(wc -l < /tmp/purge-urls.txt | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No URLs to purge"
            exit 1
          fi

          echo "✅ Prepared ${COUNT} URL(s) for purge"
          head -n 20 /tmp/purge-urls.txt

      - name: Purge Cloudflare cache by URL
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          COUNT=$(wc -l < /tmp/purge-urls.txt | tr -d ' ')
          echo "🧹 Purging ${COUNT} URL(s)..."
          PAYLOAD=$(jq -Rn '[inputs | select(length > 0)] | {files: .}' < /tmp/purge-urls.txt)

          RESP=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          echo "$RESP" | jq .
          if [ "$(echo "$RESP" | jq -r '.success // false')" != "true" ]; then
            echo "❌ Cloudflare purge failed"
            exit 1
          fi

          echo "✅ Cloudflare purge completed"
