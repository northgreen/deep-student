# 手动同步 GitHub Release 产物到 Cloudflare R2（补传/恢复用）
#
# 注意: 正常发布流程中 R2 上传已集成在 release.yml 中，
#       此工作流仅用于手动补传某个版本或恢复 R2 数据。
#
# 需要在仓库 Settings → Secrets 中配置:
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare 账户 ID
#   CLOUDFLARE_API_TOKEN   - Cloudflare API Token (需要 R2 Edit 权限)
#   CLOUDFLARE_ZONE_ID     - download.deepstudent.cn 所在 Zone ID（用于刷新 CDN 缓存）

name: Sync Release to R2 (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要同步的 Release tag（如 v0.9.9）'
        required: true

env:
  R2_BUCKET: deepstudent
  KEEP_VERSIONS: 10

jobs:
  upload-to-r2:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve tag
        id: tag
        run: |
          echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          echo "📌 Tag: ${{ github.event.inputs.tag }}"

      - name: Download Release Assets
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.repository }}
          tag: ${{ steps.tag.outputs.value }}
          fileName: "*"
          out-file-path: "dist"

      - name: Show downloaded files
        run: ls -lh dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          MAX_RETRIES=3
          RETRY_DELAY=3
          FAILED_FILES=""

          upload_with_retry() {
            local object_key="$1"
            local file_path="$2"
            local content_type="$3"
            local cache_control="$4"

            local attempt=1
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              if npx wrangler r2 object put "$object_key" \
                --file "$file_path" --content-type "$content_type" \
                --cache-control "$cache_control" --remote; then
                return 0
              fi
              echo "    ⚠️ Attempt ${attempt}/${MAX_RETRIES} failed: $(basename "$file_path")"
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                sleep "$RETRY_DELAY"
              fi
              attempt=$((attempt + 1))
            done

            return 1
          }

          echo "📤 Uploading release ${TAG} to R2..."
          for FILE in dist/*; do
            NAME=$(basename "$FILE")
            # 根据扩展名设置 Content-Type
            case "$NAME" in
              *.json) CT="application/json" ;;
              *.sig)  CT="application/pgp-signature" ;;
              *.dmg)  CT="application/x-apple-diskimage" ;;
              *.apk)  CT="application/vnd.android.package-archive" ;;
              *)      CT="application/octet-stream" ;;
            esac
            echo "  ⬆️ ${NAME} (${CT})"

            if ! upload_with_retry \
              "${R2_BUCKET}/releases/${TAG}/${NAME}" \
              "$FILE" \
              "$CT" \
              "public, max-age=31536000, immutable"; then
              echo "    ❌ Failed after ${MAX_RETRIES} attempts: ${NAME}"
              FAILED_FILES="${FAILED_FILES}${NAME}\n"
            fi
          done

          if [ -n "$FAILED_FILES" ]; then
            echo "❌ R2 upload finished with failures:"
            printf "%b" "$FAILED_FILES"
            exit 1
          fi

          echo "✅ Upload complete ($(ls dist/ | wc -l | tr -d ' ') files)"

      - name: Generate R2 latest.json for auto-updater
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          R2_BASE="https://download.deepstudent.cn/releases/${TAG}"
          MAX_RETRIES=3
          RETRY_DELAY=3

          upload_with_retry() {
            local object_key="$1"
            local file_path="$2"
            local content_type="$3"
            local cache_control="$4"

            local attempt=1
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              if npx wrangler r2 object put "$object_key" \
                --file "$file_path" --content-type "$content_type" \
                --cache-control "$cache_control" --remote; then
                return 0
              fi
              echo "⚠️ latest.json upload attempt ${attempt}/${MAX_RETRIES} failed"
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                sleep "$RETRY_DELAY"
              fi
              attempt=$((attempt + 1))
            done
            return 1
          }

          if [ ! -f dist/latest.json ]; then
            echo "⚠️ No latest.json in release assets, skipping"
            exit 0
          fi

          echo "📝 Rewriting latest.json URLs to R2..."
          # 查找 APK 文件名
          APK_NAME=$(ls dist/*.apk 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          APK_URL=""
          if [ -n "$APK_NAME" ]; then
            APK_URL="${R2_BASE}/${APK_NAME}"
            echo "📱 APK found: ${APK_NAME} → ${APK_URL}"
          fi

          # 将 GitHub 下载 URL 替换为 R2 URL，并注入 apk_url
          jq --arg base "$R2_BASE" --arg apk "$APK_URL" '
            .platforms |= with_entries(
              .value.url = ($base + "/" + (.value.url | split("/") | last))
            )
            | if $apk != "" then .apk_url = $apk else . end
          ' dist/latest.json > r2-latest.json

          echo "Original:"
          jq -r '.platforms[].url' dist/latest.json
          echo "R2 version:"
          jq -r '.platforms[].url' r2-latest.json

          # 上传到稳定路径 releases/latest.json（Tauri updater 端点）
          upload_with_retry \
            "${R2_BUCKET}/releases/latest.json" \
            "r2-latest.json" \
            "application/json" \
            "public, max-age=300"
          echo "✅ R2 latest.json uploaded to releases/latest.json"

      - name: Purge Cloudflare CDN cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          BASE_URL="https://download.deepstudent.cn/releases/${TAG}"

          if [ -z "${CLOUDFLARE_ZONE_ID}" ]; then
            echo "⚠️ CLOUDFLARE_ZONE_ID not configured, skip cache purge"
            exit 0
          fi

          {
            for FILE in dist/*; do
              NAME=$(basename "$FILE")
              echo "${BASE_URL}/${NAME}"
            done
            echo "https://download.deepstudent.cn/releases/latest.json"
          } | sort -u > /tmp/purge-urls.txt

          URL_COUNT=$(wc -l < /tmp/purge-urls.txt | tr -d ' ')
          if [ "$URL_COUNT" -eq 0 ]; then
            echo "⚠️ No URLs to purge"
            exit 0
          fi

          echo "🧹 Purging ${URL_COUNT} URL(s) from Cloudflare cache..."
          PAYLOAD=$(jq -Rn '[inputs | select(length > 0)] | {files: .}' < /tmp/purge-urls.txt)
          RESP=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          echo "$RESP" | jq .
          if [ "$(echo "$RESP" | jq -r '.success // false')" != "true" ]; then
            echo "❌ Cloudflare cache purge failed"
            exit 1
          fi
          echo "✅ Cloudflare cache purged"

      - name: Cleanup old versions (keep latest ${{ env.KEEP_VERSIONS }})
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Checking for old versions to clean up..."

          # 通过 GitHub API 获取所有 release tags（按发布时间倒序）
          RELEASES=$(gh api repos/${{ github.repository }}/releases \
            --paginate -q '.[].tag_name')

          TOTAL=$(echo "$RELEASES" | grep -c . || true)
          echo "Found ${TOTAL} releases on GitHub"

          if [ "$TOTAL" -le "$KEEP_VERSIONS" ]; then
            echo "✅ No cleanup needed (${TOTAL} ≤ ${KEEP_VERSIONS})"
            exit 0
          fi

          # 跳过最新的 KEEP_VERSIONS 个，删除更旧的
          TO_DELETE=$(echo "$RELEASES" | tail -n +$((KEEP_VERSIONS + 1)))
          DELETE_COUNT=$(echo "$TO_DELETE" | grep -c . || true)

          echo "🗑️ Deleting ${DELETE_COUNT} old versions from R2:"
          echo "$TO_DELETE" | while read -r OLD_TAG; do
            [ -z "$OLD_TAG" ] && continue
            echo "  Removing releases/${OLD_TAG}/..."
            # 获取该 release 的所有 asset 文件名，逐个从 R2 删除
            ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${OLD_TAG}" \
              -q '.assets[].name' 2>/dev/null || true)
            echo "$ASSETS" | while read -r NAME; do
              [ -z "$NAME" ] && continue
              npx wrangler r2 object delete "${R2_BUCKET}/releases/${OLD_TAG}/${NAME}" --remote 2>/dev/null || true
            done
          done

          echo "✅ Cleanup complete"
