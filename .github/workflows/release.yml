# ╔══════════════════════════════════════════════════════════════════╗
# ║  Deep Student 自动发布工作流 (唯一入口)                        ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║                                                                ║
# ║  发布流程 (唯一路径):                                          ║
# ║    1. 开发者向 main 推送 conventional commits                  ║
# ║    2. release-please 自动创建/更新 Release PR (版本号升级)     ║
# ║    3. 合并 Release PR → 三路检测 release commit:               ║
# ║       a) release-please 输出 release_created=true              ║
# ║       b) HEAD commit 消息匹配 chore(main): release X.Y.Z      ║
# ║       c) HEAD 为 merge commit 时扫描父提交 (v0.9.33 修复)     ║
# ║    4. 版本号三重校验 (tag vs 代码中 3 处版本号)                ║
# ║    5. 通过校验 → 并行构建全平台产物                            ║
# ║    6. 发布产物到 GitHub Release + R2 镜像                      ║
# ║                                                                ║
# ║  为什么没有 workflow_dispatch / tag push 触发:                  ║
# ║    - workflow_dispatch 允许在任意时间点触发构建, 存在           ║
# ║      headSha 与 tag 不一致的风险 (v0.9.21 事故根因)            ║
# ║    - GITHUB_TOKEN 创建的 tag 不会触发后续 workflow             ║
# ║      (GitHub 的防递归机制), 所以 tag push 触发不可行            ║
# ║    - 三路检测确保即使 release commit 被 merge commit 包裹      ║
# ║      也能正确识别 (v0.9.33 事故根因: 并发 push 产生 merge)    ║
# ║                                                                ║
# ║  重建某个版本:                                                 ║
# ║    使用 rebuild-release.yml 手动触发, 输入已存在的 tag 名称    ║
# ║    该 workflow 走相同的校验 + 构建 + 发布流程                  ║
# ║                                                                ║
# ║  手动重建某个版本:                                              ║
# ║    使用 "Rebuild Release" workflow (rebuild-release.yml)        ║
# ║    在 GitHub Actions 页面手动触发, 输入已存在的 tag 名称        ║
# ║    该 workflow 执行与主流程相同的版本校验 + 构建 + 发布        ║
# ║                                                                ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║  Secrets 配置:                                                 ║
# ║    TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD║
# ║    ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD         ║
# ║    ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD                    ║
# ║    CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_API_TOKEN                ║
# ║    VERCEL_DEPLOY_HOOK (可选)                                   ║
# ║  macOS 公证 (可选):                                            ║
# ║    APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD          ║
# ║    APPLE_TEAM_ID                                               ║
# ╚══════════════════════════════════════════════════════════════════╝

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

env:
  GITHUB_REPO: ${{ github.repository }}
  R2_BUCKET: deepstudent
  KEEP_VERSIONS: 10

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 阶段一: release-please
  # 每次 push to main 都运行; 仅当合并 Release PR 时输出 release_created
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.result.outputs.release_created }}
      tag_name: ${{ steps.result.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-release: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Resolve release result
        id: result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RP_CREATED: ${{ steps.release.outputs.release_created }}
          RP_TAG: ${{ steps.release.outputs.tag_name }}
          RP_OUTCOME: ${{ steps.release.outcome }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          echo "ℹ️ release-please outcome: ${RP_OUTCOME}"
          echo "ℹ️ RP_CREATED=${RP_CREATED}, RP_TAG=${RP_TAG}"

          RELEASE_PATTERN='^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+)'

          # Helper: create GitHub Release for a detected tag
          try_create_release() {
            local TAG="$1"
            local SOURCE="$2"

            echo "ℹ️ Detected release ${TAG} (via ${SOURCE})"

            if gh release view "${TAG}" >/dev/null 2>&1; then
              echo "release_created=false" >> $GITHUB_OUTPUT
              echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
              echo "ℹ️ Release ${TAG} already exists; skipping duplicate creation"
              return 0
            fi

            gh release create "${TAG}" \
              --target "${HEAD_SHA}" \
              --title "${TAG}" \
              --generate-notes

            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
            echo "✅ Created GitHub Release ${TAG} (detected via ${SOURCE})"
            return 0
          }

          # Path 1: release-please directly reported a release
          if [[ "${RP_CREATED}" == "true" && -n "${RP_TAG}" ]]; then
            try_create_release "${RP_TAG}" "release-please output"
            exit 0
          fi

          # Path 2: HEAD commit is a release commit
          HEAD_COMMIT_SUBJECT="$(printf '%s\n' "${HEAD_COMMIT_MSG}" | head -n1)"
          echo "ℹ️ head commit subject: ${HEAD_COMMIT_SUBJECT}"

          if [[ "${HEAD_COMMIT_SUBJECT}" =~ ^chore\(main\):\ release\ ([0-9]+\.[0-9]+\.[0-9]+)(\ \(#[0-9]+\))?$ ]]; then
            try_create_release "v${BASH_REMATCH[1]}" "HEAD commit message"
            exit 0
          fi

          # Path 3: HEAD is a merge commit whose parent is a release commit
          # This handles the case where a concurrent push created a merge commit
          # that buried the release commit (e.g. v0.9.33 incident)
          PARENT_COUNT=$(git cat-file -p HEAD | grep -c '^parent ')
          if [[ "$PARENT_COUNT" -gt 1 ]]; then
            echo "ℹ️ HEAD is a merge commit with ${PARENT_COUNT} parents, scanning for release commits..."
            while IFS= read -r PARENT_SHA; do
              PARENT_SUBJECT=$(git log -1 --format='%s' "$PARENT_SHA" 2>/dev/null || true)
              echo "  parent ${PARENT_SHA:0:7}: ${PARENT_SUBJECT}"
              if [[ "${PARENT_SUBJECT}" =~ $RELEASE_PATTERN ]]; then
                try_create_release "v${BASH_REMATCH[1]}" "merge parent ${PARENT_SHA:0:7}"
                exit 0
              fi
            done < <(git cat-file -p HEAD | grep '^parent ' | awk '{print $2}')
          fi

          echo "release_created=false" >> $GITHUB_OUTPUT
          echo "⏭️ No release created this run"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 阶段二: 版本号三重校验门禁
  # 仅当 release-please 报告 release_created 时运行
  # 校验 tag 版本号与代码中三处版本号完全一致后才放行构建
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  verify:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      tag_name: ${{ steps.verify.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Verify version consistency
        id: verify
        run: |
          TAG_NAME="${{ needs.release-please.outputs.tag_name }}"
          TAG_VERSION="${TAG_NAME#v}"

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT

          PKG_VERSION=$(jq -r '.version' package.json)
          CARGO_VERSION=$(sed -n '/^\[package\]/,/^\[/{s/^version *= *"\(.*\)"/\1/p}' src-tauri/Cargo.toml)
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

          echo "══════════════════════════════════════"
          echo "  Tag version:       ${TAG_VERSION}"
          echo "  package.json:      ${PKG_VERSION}"
          echo "  Cargo.toml:        ${CARGO_VERSION}"
          echo "  tauri.conf.json:   ${TAURI_VERSION}"
          echo "══════════════════════════════════════"

          ERRORS=0

          if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})"
            ERRORS=$((ERRORS + 1))
          fi

          if [[ "${CARGO_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::Cargo.toml version (${CARGO_VERSION}) does not match tag (${TAG_VERSION})"
            ERRORS=$((ERRORS + 1))
          fi

          if [[ "${TAURI_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::tauri.conf.json version (${TAURI_VERSION}) does not match tag (${TAG_VERSION})"
            ERRORS=$((ERRORS + 1))
          fi

          if [[ $ERRORS -gt 0 ]]; then
            echo "::error::Version mismatch detected! ${ERRORS} file(s) have inconsistent versions."
            echo "::error::This usually means release-please did not update all version files."
            echo "::error::Check release-please-config.json extra-files configuration."
            exit 1
          fi

          echo "✅ All version numbers are consistent: ${TAG_VERSION}"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 阶段三: 构建 (通过版本校验后并行构建全平台)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # ── macOS ──────────────────────────────────────────────────────
  build-macos:
    needs: [verify]
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Generate version info
        run: node scripts/generate-version.mjs

      - name: Prepare target-specific pdfium
        run: |
          TARGET="${{ matrix.target }}"
          if [[ -x "scripts/prepare-pdfium-macos.sh" ]]; then
            bash scripts/prepare-pdfium-macos.sh "$TARGET"
            exit 0
          fi

          echo "[warn] scripts/prepare-pdfium-macos.sh not found, falling back to legacy prepare flow."
          if [[ ! -x "scripts/download-pdfium.sh" ]]; then
            echo "[warn] scripts/download-pdfium.sh not found, skip pdfium prepare."
            exit 0
          fi

          case "$TARGET" in
            aarch64-apple-darwin)
              rm -f src-tauri/resources/pdfium/libpdfium.dylib
              bash scripts/download-pdfium.sh macos-arm64
              ;;
            x86_64-apple-darwin)
              rm -f src-tauri/resources/pdfium/libpdfium.dylib
              bash scripts/download-pdfium.sh macos-x64
              ;;
            *)
              echo "::error::Unsupported macOS target: $TARGET"
              exit 1
              ;;
          esac

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SILICONFLOW_BUILTIN_TEXT_KEY: ${{ secrets.SILICONFLOW_BUILTIN_TEXT_KEY }}
          SILICONFLOW_BUILTIN_VISION_KEY: ${{ secrets.SILICONFLOW_BUILTIN_VISION_KEY }}
          SILICONFLOW_BUILTIN_EMBED_KEY: ${{ secrets.SILICONFLOW_BUILTIN_EMBED_KEY }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Verify bundled pdfium architecture
        run: |
          TARGET="${{ matrix.target }}"
          if [[ -x "scripts/verify-macos-pdfium-bundle.sh" ]]; then
            bash scripts/verify-macos-pdfium-bundle.sh "$TARGET"
            exit 0
          fi

          echo "[warn] scripts/verify-macos-pdfium-bundle.sh not found, falling back to legacy verify flow."
          APP_DIR=$(find "src-tauri/target/$TARGET/release/bundle/macos" -maxdepth 1 -type d -name '*.app' | head -n 1)
          if [[ -z "$APP_DIR" ]]; then
            echo "[warn] No .app found for $TARGET, skip verify."
            exit 0
          fi
          LIB="$APP_DIR/Contents/Resources/libpdfium.dylib"
          if [[ ! -f "$LIB" ]]; then
            echo "[warn] Bundled libpdfium.dylib missing, skip verify."
            exit 0
          fi
          ARCH_INFO=$(lipo -info "$LIB" 2>/dev/null || true)
          case "$TARGET" in
            aarch64-apple-darwin)
              [[ "$ARCH_INFO" == *"arm64"* ]] || { echo "::error::Bundled libpdfium missing arm64: $ARCH_INFO"; exit 1; }
              ;;
            x86_64-apple-darwin)
              [[ "$ARCH_INFO" == *"x86_64"* ]] || { echo "::error::Bundled libpdfium missing x86_64: $ARCH_INFO"; exit 1; }
              ;;
          esac
          echo "Verified bundled pdfium: $ARCH_INFO"

      - name: Rename updater artifacts with arch suffix
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ARCH=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          for f in "$BUNDLE_DIR"/*.app.tar.gz; do
            [ -f "$f" ] || continue
            BASE=$(basename "$f" .app.tar.gz | tr ' ' '.')
            mv "$f" "$BUNDLE_DIR/${BASE}_${ARCH}.app.tar.gz"
            [ -f "$f.sig" ] && mv "$f.sig" "$BUNDLE_DIR/${BASE}_${ARCH}.app.tar.gz.sig"
          done
          echo "📦 Renamed updater artifacts:"
          ls -la "$BUNDLE_DIR"/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ── Windows ────────────────────────────────────────────────────
  build-windows:
    needs: [verify]
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Generate version info
        run: node scripts/generate-version.mjs

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SILICONFLOW_BUILTIN_TEXT_KEY: ${{ secrets.SILICONFLOW_BUILTIN_TEXT_KEY }}
          SILICONFLOW_BUILTIN_VISION_KEY: ${{ secrets.SILICONFLOW_BUILTIN_VISION_KEY }}
          SILICONFLOW_BUILTIN_EMBED_KEY: ${{ secrets.SILICONFLOW_BUILTIN_EMBED_KEY }}
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig

  # ── Linux ──────────────────────────────────────────────────────
  build-linux:
    needs: [verify]
    runs-on: ubuntu-24.04
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Generate version info
        run: node scripts/generate-version.mjs

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SILICONFLOW_BUILTIN_TEXT_KEY: ${{ secrets.SILICONFLOW_BUILTIN_TEXT_KEY }}
          SILICONFLOW_BUILTIN_VISION_KEY: ${{ secrets.SILICONFLOW_BUILTIN_VISION_KEY }}
          SILICONFLOW_BUILTIN_EMBED_KEY: ${{ secrets.SILICONFLOW_BUILTIN_EMBED_KEY }}
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage

      - name: Rename updater artifacts with arch suffix
        run: |
          BUNDLE_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          for f in "$BUNDLE_DIR"/*.AppImage.tar.gz; do
            [ -f "$f" ] || continue
            BASE=$(basename "$f" .AppImage.tar.gz | tr ' ' '.')
            mv "$f" "$BUNDLE_DIR/${BASE}_x86_64.AppImage.tar.gz"
            [ -f "$f.sig" ] && mv "$f.sig" "$BUNDLE_DIR/${BASE}_x86_64.AppImage.tar.gz.sig"
          done
          echo "📦 Linux bundle artifacts:"
          ls -la src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz.sig

  # ── Android ────────────────────────────────────────────────────
  build-android:
    needs: [verify]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag_name }}

      - name: Free disk space
        run: |
          echo "=== Disk usage BEFORE cleanup ==="
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/lib/android/sdk/ndk \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/graalvm \
            /usr/local/lib/node_modules \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby
          sudo docker image prune --all --force
          echo "=== Disk usage AFTER cleanup ==="
          df -h /

      - name: Add swap space
        run: |
          SWAPFILE=/swapfile

          if swapon --show --noheadings | grep -q .; then
            echo "Swap already enabled on runner; skipping allocation"
          else
            if ! sudo fallocate -l 8G "$SWAPFILE"; then
              echo "::warning::fallocate failed; retrying swap creation with dd"
              sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192 status=progress
            fi

            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"

            if sudo swapon "$SWAPFILE"; then
              echo "Swap enabled at $SWAPFILE"
            else
              echo "::warning::Failed to enable swap on this runner; continuing without extra swap"
              sudo rm -f "$SWAPFILE"
            fi
          fi

          echo "=== Memory + Swap ==="
          free -h
          swapon --show || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35" | tail -3
          echo "NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Generate version info
        run: node scripts/generate-version.mjs

      - name: Initialize Android project
        run: npx tauri android init

      - name: Copy custom Android icons
        run: |
          ICONS_SRC="src-tauri/icons/android"
          RES_DST="src-tauri/gen/android/app/src/main/res"
          if [ -d "$ICONS_SRC" ]; then
            for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              if [ -d "$ICONS_SRC/$density" ]; then
                mkdir -p "$RES_DST/$density"
                cp -f "$ICONS_SRC/$density/"* "$RES_DST/$density/"
              fi
            done
            if [ -d "$ICONS_SRC/mipmap-anydpi-v26" ]; then
              mkdir -p "$RES_DST/mipmap-anydpi-v26"
              cp -f "$ICONS_SRC/mipmap-anydpi-v26/"* "$RES_DST/mipmap-anydpi-v26/"
            fi
            if [ -f "$ICONS_SRC/values/ic_launcher_background.xml" ]; then
              mkdir -p "$RES_DST/values"
              cp -f "$ICONS_SRC/values/ic_launcher_background.xml" "$RES_DST/values/"
            fi
            rm -f "$RES_DST/drawable-v24/ic_launcher_foreground.xml"
            rm -f "$RES_DST/drawable/ic_launcher_background.xml"
            echo "✅ Custom Android icons copied from $ICONS_SRC"
            find "$RES_DST" -name "ic_launcher*" -type f | head -20
          else
            echo "⚠️ No custom Android icons found at $ICONS_SRC, using defaults"
          fi

      - name: Bundle pdfium for Android
        run: |
          JNILIBS_DIR="src-tauri/gen/android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNILIBS_DIR"
          if [ -f "src-tauri/resources/pdfium/libpdfium_android_arm64.so" ]; then
            cp src-tauri/resources/pdfium/libpdfium_android_arm64.so "$JNILIBS_DIR/libpdfium.so"
            echo "✅ Bundled pdfium for arm64: $(ls -lh "$JNILIBS_DIR/libpdfium.so" | awk '{print $5}')"
          else
            echo "⚠️ Android pdfium .so not found, downloading..."
            bash scripts/download-pdfium.sh android-arm64
            cp src-tauri/resources/pdfium/libpdfium_android_arm64.so "$JNILIBS_DIR/libpdfium.so"
            echo "✅ Downloaded and bundled pdfium for arm64"
          fi

      - name: Configure NDK toolchain
        run: |
          NDK_PREBUILT="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          sed -i '/\[target.aarch64-linux-android\]/,/^$/{ s|linker = .*|linker = "'"${NDK_PREBUILT}"'/bin/aarch64-linux-android21-clang"|; s|ar = .*|ar = "'"${NDK_PREBUILT}"'/bin/llvm-ar"| }' src-tauri/.cargo/config.toml

          echo "CC_aarch64_linux_android=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${NDK_PREBUILT}/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

          echo "✅ NDK toolchain configured:"
          cat src-tauri/.cargo/config.toml | grep -A2 aarch64-linux-android

      - name: Build Android APK
        env:
          SILICONFLOW_BUILTIN_TEXT_KEY: ${{ secrets.SILICONFLOW_BUILTIN_TEXT_KEY }}
          SILICONFLOW_BUILTIN_VISION_KEY: ${{ secrets.SILICONFLOW_BUILTIN_VISION_KEY }}
          SILICONFLOW_BUILTIN_EMBED_KEY: ${{ secrets.SILICONFLOW_BUILTIN_EMBED_KEY }}
        run: |
          set -o pipefail
          set +e

          MAX_ATTEMPTS=3
          TRANSIENT_PATTERN="Received status code 5[0-9]{2}|Could not GET 'https://dl\\.google\\.com|Could not get resource 'https://dl\\.google\\.com|Bad Gateway|Read timed out|Connection reset|Temporary failure in name resolution"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            LOG_FILE="/tmp/tauri-android-build-${attempt}.log"
            echo "Starting Android build attempt ${attempt}/${MAX_ATTEMPTS}"

            npx tauri android build --target aarch64 2>&1 | tee "$LOG_FILE"
            status=${PIPESTATUS[0]}

            if [ "$status" -eq 0 ]; then
              echo "Android build succeeded on attempt ${attempt}/${MAX_ATTEMPTS}"
              exit 0
            fi

            if grep -Eq "$TRANSIENT_PATTERN" "$LOG_FILE" && [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "::warning::Transient Android dependency/network failure detected on attempt ${attempt}/${MAX_ATTEMPTS}; retrying"
              rm -rf "$HOME/.gradle/caches/modules-2/files-2.1" 2>/dev/null || true
              sleep $((attempt * 20))
              continue
            fi

            echo "::error::Android build failed on attempt ${attempt}/${MAX_ATTEMPTS}"
            exit "$status"
          done

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > /tmp/release.keystore

          UNSIGNED_APK=$(find src-tauri/gen/android -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "::error::未找到未签名的 APK"
            find src-tauri/gen/android -name "*.apk" -type f
            exit 1
          fi
          echo "找到 APK: $UNSIGNED_APK"

          BUILD_TOOLS=$(ls -d "${ANDROID_HOME}/build-tools/"* | sort -V | tail -1)

          "${BUILD_TOOLS}/zipalign" -v 4 "$UNSIGNED_APK" /tmp/aligned.apk

          "${BUILD_TOOLS}/apksigner" sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "${ANDROID_KEY_ALIAS:-deepstudent}" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --in /tmp/aligned.apk \
            --out /tmp/signed.apk

          "${BUILD_TOOLS}/apksigner" verify --print-certs /tmp/signed.apk

          VERSION="${{ needs.verify.outputs.version }}"
          mkdir -p android-output
          cp /tmp/signed.apk "android-output/Deep.Student_${VERSION}_arm64.apk"

          rm -f /tmp/release.keystore

          echo "✅ APK 签名完成: Deep.Student_${VERSION}_arm64.apk"
          ls -lh android-output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: android-output/*.apk

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 阶段四: 发布 (全平台构建完成后统一发布)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  publish:
    needs: [verify, build-macos, build-windows, build-linux, build-android]
    if: |
      always() &&
      needs.verify.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.tag_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -type f | head -50

      - name: Normalize artifact filenames
        run: |
          find artifacts -type f -name '* *' | while IFS= read -r f; do
            DIR=$(dirname "$f")
            OLD=$(basename "$f")
            NEW=$(echo "$OLD" | tr ' ' '.')
            mv "$f" "$DIR/$NEW"
            echo "  Renamed: $OLD → $NEW"
          done

      - name: Generate latest.json
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="${{ needs.verify.outputs.tag_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANNEL=$(cat .release-channel 2>/dev/null | tr -d '[:space:]' || echo "stable")
          if [[ "$CHANNEL" != "experimental" ]]; then CHANNEL="stable"; fi
          echo "📢 Release channel: ${CHANNEL}"

          PLATFORMS="{}"

          # ── macOS aarch64 ──
          MACOS_ARM_DIR="artifacts/macos-aarch64-apple-darwin"
          if [ -d "$MACOS_ARM_DIR" ]; then
            TAR=$(find "$MACOS_ARM_DIR" -name "*_aarch64.app.tar.gz" ! -name "*.sig" | head -1)
            SIG=$(find "$MACOS_ARM_DIR" -name "*_aarch64.app.tar.gz.sig" | head -1)
            if [ -n "$TAR" ] && [ -n "$SIG" ]; then
              TAR_NAME=$(basename "$TAR")
              SIGNATURE=$(cat "$SIG")
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$TAR_NAME" \
                --arg sig "$SIGNATURE" \
                '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
            fi
          fi

          # ── macOS x86_64 ──
          MACOS_X64_DIR="artifacts/macos-x86_64-apple-darwin"
          if [ -d "$MACOS_X64_DIR" ]; then
            TAR=$(find "$MACOS_X64_DIR" -name "*_x86_64.app.tar.gz" ! -name "*.sig" | head -1)
            SIG=$(find "$MACOS_X64_DIR" -name "*_x86_64.app.tar.gz.sig" | head -1)
            if [ -n "$TAR" ] && [ -n "$SIG" ]; then
              TAR_NAME=$(basename "$TAR")
              SIGNATURE=$(cat "$SIG")
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$TAR_NAME" \
                --arg sig "$SIGNATURE" \
                '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')
            fi
          fi

          # ── Windows x86_64 ──
          WIN_DIR="artifacts/windows-x86_64"
          if [ -d "$WIN_DIR" ]; then
            EXE=$(find "$WIN_DIR" -name "*-setup.exe" ! -name "*.sig" | head -1)
            SIG=$(find "$WIN_DIR" -name "*-setup.exe.sig" | head -1)
            if [ -n "$EXE" ] && [ -n "$SIG" ]; then
              EXE_NAME=$(basename "$EXE")
              SIGNATURE=$(cat "$SIG")
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$EXE_NAME" \
                --arg sig "$SIGNATURE" \
                '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
            fi
          fi

          # ── Linux x86_64 ──
          LINUX_DIR="artifacts/linux-x86_64"
          if [ -d "$LINUX_DIR" ]; then
            TAR=$(find "$LINUX_DIR" -name "*_x86_64.AppImage.tar.gz" ! -name "*.sig" | head -1)
            if [ -z "$TAR" ]; then
              TAR=$(find "$LINUX_DIR" -name "*.AppImage.tar.gz" ! -name "*.sig" | head -1)
            fi
            SIG=""
            if [ -n "$TAR" ] && [ -f "$TAR.sig" ]; then
              SIG="$TAR.sig"
            elif [ -n "$TAR" ]; then
              SIG=$(find "$LINUX_DIR" -name "$(basename "$TAR").sig" | head -1)
            fi
            if [ -n "$TAR" ] && [ -n "$SIG" ]; then
              TAR_NAME=$(basename "$TAR")
              SIGNATURE=$(cat "$SIG")
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$TAR_NAME" \
                --arg sig "$SIGNATURE" \
                '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
            fi
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Deep Student v$VERSION 更新" \
            --arg pub_date "$DATE" \
            --arg channel "$CHANNEL" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, channel: $channel, platforms: $platforms}' \
            > latest.json

          echo "✅ latest.json 已生成:"
          cat latest.json

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp latest.json release-files/

          find artifacts -name "*.app.tar.gz" -exec cp {} release-files/ \;
          find artifacts -name "*.app.tar.gz.sig" -exec cp {} release-files/ \;
          find artifacts -name "*.dmg" -exec cp {} release-files/ \;
          find artifacts -name "*.exe" -exec cp {} release-files/ \;
          find artifacts -name "*.exe.sig" -exec cp {} release-files/ \;
          find artifacts -name "*.AppImage" -exec cp {} release-files/ \;
          find artifacts -name "*.AppImage.tar.gz" -exec cp {} release-files/ \;
          find artifacts -name "*.AppImage.tar.gz.sig" -exec cp {} release-files/ \;
          find artifacts -name "*.deb" -exec cp {} release-files/ \;
          find artifacts -name "*.rpm" -exec cp {} release-files/ \;
          find artifacts -name "*.apk" -exec cp {} release-files/ \;

          echo "📦 Release files:"
          ls -lh release-files/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2 pinned
        with:
          tag_name: ${{ needs.verify.outputs.tag_name }}
          draft: false
          prerelease: false
          files: release-files/*

      # ── R2 镜像上传 ────────────────────────────────────────────
      - name: Setup Node.js for wrangler
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG="${{ needs.verify.outputs.tag_name }}"
          MAX_RETRIES=3
          RETRY_DELAY=3
          FAILED_FILES=""

          upload_with_retry() {
            local object_key="$1"
            local file_path="$2"
            local content_type="$3"
            local cache_control="$4"

            local attempt=1
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              if npx wrangler r2 object put "$object_key" \
                --file "$file_path" --content-type "$content_type" \
                --cache-control "$cache_control" --remote; then
                return 0
              fi
              echo "    ⚠️ Attempt ${attempt}/${MAX_RETRIES} failed: $(basename "$file_path")"
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                sleep "$RETRY_DELAY"
              fi
              attempt=$((attempt + 1))
            done

            return 1
          }

          echo "📤 Uploading release ${TAG} to R2..."
          for FILE in release-files/*; do
            NAME=$(basename "$FILE")
            [ "$NAME" = "latest.json" ] && continue
            case "$NAME" in
              *.sig)  CT="application/pgp-signature" ;;
              *.dmg)  CT="application/x-apple-diskimage" ;;
              *.deb)  CT="application/vnd.debian.binary-package" ;;
              *.rpm)  CT="application/x-rpm" ;;
              *.apk)  CT="application/vnd.android.package-archive" ;;
              *)      CT="application/octet-stream" ;;
            esac
            echo "  ⬆️ ${NAME} (${CT})"

            if ! upload_with_retry \
              "${R2_BUCKET}/releases/${TAG}/${NAME}" \
              "$FILE" \
              "$CT" \
              "public, max-age=31536000, immutable"; then
              echo "    ❌ Failed after ${MAX_RETRIES} attempts: ${NAME}"
              FAILED_FILES="${FAILED_FILES}${NAME}\n"
            fi
          done

          if [ -n "$FAILED_FILES" ]; then
            echo "❌ R2 upload finished with failures:"
            printf "%b" "$FAILED_FILES"
            exit 1
          fi

          echo "✅ R2 upload complete"

      - name: Generate R2 latest.json
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG="${{ needs.verify.outputs.tag_name }}"
          R2_BASE="https://download.deepstudent.cn/releases/${TAG}"
          MAX_RETRIES=3
          RETRY_DELAY=3

          upload_with_retry() {
            local object_key="$1"
            local file_path="$2"
            local content_type="$3"
            local cache_control="$4"

            local attempt=1
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              if npx wrangler r2 object put "$object_key" \
                --file "$file_path" --content-type "$content_type" \
                --cache-control "$cache_control" --remote; then
                return 0
              fi
              echo "⚠️ latest.json upload attempt ${attempt}/${MAX_RETRIES} failed"
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                sleep "$RETRY_DELAY"
              fi
              attempt=$((attempt + 1))
            done
            return 1
          }

          if [ ! -f latest.json ]; then
            echo "⚠️ No latest.json, skipping"
            exit 0
          fi

          APK_NAME=$(ls release-files/*.apk 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          APK_URL=""
          if [ -n "$APK_NAME" ]; then
            APK_URL="${R2_BASE}/${APK_NAME}"
            echo "📱 APK: ${APK_URL}"
          fi

          jq --arg base "$R2_BASE" --arg apk "$APK_URL" '
            .platforms |= with_entries(
              .value.url = ($base + "/" + (.value.url | split("/") | last))
            )
            | if $apk != "" then .apk_url = $apk else . end
          ' latest.json > r2-latest.json

          echo "R2 latest.json:"
          cat r2-latest.json

          upload_with_retry \
            "${R2_BUCKET}/releases/latest.json" \
            "r2-latest.json" \
            "application/json" \
            "public, max-age=300"
          echo "✅ R2 latest.json uploaded"

      - name: Cleanup old R2 versions
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Checking for old versions to clean up..."
          RELEASES=$(gh api repos/${{ github.repository }}/releases \
            --paginate -q '.[].tag_name')
          TOTAL=$(echo "$RELEASES" | grep -c . || true)
          echo "Found ${TOTAL} releases"

          if [ "$TOTAL" -le "$KEEP_VERSIONS" ]; then
            echo "✅ No cleanup needed (${TOTAL} ≤ ${KEEP_VERSIONS})"
            exit 0
          fi

          TO_DELETE=$(echo "$RELEASES" | tail -n +$((KEEP_VERSIONS + 1)))
          echo "🗑️ Deleting $(echo "$TO_DELETE" | grep -c . || true) old versions from R2"
          echo "$TO_DELETE" | while read -r OLD_TAG; do
            [ -z "$OLD_TAG" ] && continue
            echo "  Removing releases/${OLD_TAG}/..."
            ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${OLD_TAG}" \
              -q '.assets[].name' 2>/dev/null || true)
            echo "$ASSETS" | while read -r NAME; do
              [ -z "$NAME" ] && continue
              npx wrangler r2 object delete "${R2_BUCKET}/releases/${OLD_TAG}/${NAME}" --remote 2>/dev/null || true
            done
          done
          echo "✅ R2 cleanup complete"

      # ── 触发官网重构建 ─────────────────────────────────────────
      - name: Trigger website rebuild
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "⚠️ VERCEL_DEPLOY_HOOK not configured, skipping"
            exit 0
          fi
          RESP=$(curl -s -X POST "$VERCEL_DEPLOY_HOOK")
          echo "🌐 Website rebuild triggered: $RESP"
  trigger-android-rebuild:
    needs: [verify, build-android, publish]
    if: |
      always() &&
      needs.publish.result == 'success' &&
      needs.build-android.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Android rebuild workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TAG_NAME: ${{ needs.verify.outputs.tag_name }}
        run: |
          REF="${DEFAULT_BRANCH:-main}"
          TAG="${TAG_NAME}"

          if [ -z "$TAG" ]; then
            echo "::error::Missing release tag output; cannot dispatch Android rebuild"
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg ref "$REF" \
            --arg tag "$TAG" \
            '{ref: $ref, inputs: {tag_name: $tag, source_ref: $tag}}')

          echo "Dispatching rebuild-android.yml for ${TAG} using workflow ref ${REF}"
          echo "$PAYLOAD" | gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/rebuild-android.yml/dispatches" \
            --input -

          echo "Android rebuild workflow dispatched for ${TAG}"
